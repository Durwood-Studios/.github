<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060609"/>
      <stop offset="50%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#060609"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.02)" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Ambient glow orbs -->
  <ellipse cx="250" cy="200" rx="200" ry="150" fill="rgba(16,185,129,0.04)"/>
  <ellipse cx="950" cy="180" rx="180" ry="130" fill="rgba(6,182,212,0.03)"/>

  <!-- Decorative circuit traces - left side -->
  <g stroke="rgba(16,185,129,0.12)" stroke-width="1.5" fill="none">
    <path d="M 40 120 L 100 120 L 100 180"/>
    <path d="M 40 200 L 80 200 L 120 160"/>
    <path d="M 40 280 L 100 280 L 100 220"/>
    <circle cx="100" cy="180" r="3" fill="rgba(16,185,129,0.3)"/>
    <circle cx="120" cy="160" r="3" fill="rgba(16,185,129,0.3)"/>
    <circle cx="100" cy="220" r="3" fill="rgba(16,185,129,0.3)"/>
  </g>

  <!-- Decorative circuit traces - right side -->
  <g stroke="rgba(6,182,212,0.12)" stroke-width="1.5" fill="none">
    <path d="M 1160 120 L 1100 120 L 1100 180"/>
    <path d="M 1160 200 L 1120 200 L 1080 160"/>
    <path d="M 1160 280 L 1100 280 L 1100 220"/>
    <circle cx="1100" cy="180" r="3" fill="rgba(6,182,212,0.3)"/>
    <circle cx="1080" cy="160" r="3" fill="rgba(6,182,212,0.3)"/>
    <circle cx="1100" cy="220" r="3" fill="rgba(6,182,212,0.3)"/>
  </g>

  <!-- Accent line top -->
  <rect x="440" y="0" width="320" height="2" fill="url(#accent)" opacity="0.4"/>

  <!-- Company name -->
  <text x="600" y="165" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="700" letter-spacing="6" fill="white" filter="url(#glow)">DURWOOD</text>
  <text x="600" y="215" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="400" letter-spacing="12" fill="url(#accent)">STUDIOS</text>

  <!-- Tagline -->
  <text x="600" y="275" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-style="italic" fill="rgba(255,255,255,0.35)">We build software that works.</text>

  <!-- Bottom accent bar -->
  <rect x="500" y="310" width="200" height="1" fill="url(#accent)" opacity="0.25"/>

  <!-- Bottom tags -->
  <g font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.2)">
    <text x="355" y="350" text-anchor="middle">Full-Stack</text>
    <text x="475" y="350" text-anchor="middle">AI / ML</text>
    <text x="600" y="350" text-anchor="middle">Systems</text>
    <text x="725" y="350" text-anchor="middle">Learning</text>
    <text x="845" y="350" text-anchor="middle">Open Source</text>
  </g>

  <!-- Corner marks for framing -->
  <g stroke="rgba(16,185,129,0.15)" stroke-width="1.5" fill="none">
    <path d="M 30 50 L 30 30 L 50 30"/>
    <path d="M 1170 50 L 1170 30 L 1150 30"/>
    <path d="M 30 350 L 30 370 L 50 370"/>
    <path d="M 1170 350 L 1170 370 L 1150 370"/>
  </g>
</svg>
